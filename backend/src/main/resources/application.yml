spring:
  application:
    name: JobAssistant

  # Import local secret configuration.
  # The application can still start if the file does not exist,
  # but properties without other values will be unavailable.
  config:
    import: classpath:application-secret.yml

  # Data source configuration.
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/jobassistant
    username: postgres

  # JPA configuration.
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Flyway configuration.
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  issuer: job-assistant #JWT 的签发者
  expiration-seconds: 7200
app:
  cors:
    allowed-origin: http://localhost:5173